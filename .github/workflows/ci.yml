name: CI and Deploy

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, frontend]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run lint
      - if: matrix.app == 'backend'
        run: npm test
      - if: matrix.app == 'frontend'
        run: npm run build

  container-build:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag project-management-api:${{ github.sha }} backend
      - run: docker build --tag project-management-web:${{ github.sha }} frontend

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: container-build
    environment: production
    steps:
      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VM_APP_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.production up --build --detach --remove-orphans
            docker image prune --force
            curl --fail --silent --show-error http://127.0.0.1:8080/api/v1/health
